<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust JWT Authentication</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="background"></div>

<div class="container">

    <header class="hero">

        <h1>Rust JWT Authentication</h1>

        <p>
            Axum • PostgreSQL • Redis • SQLx • JWT RS256 • Argon2
        </p>

    </header>

    <section class="auth-card">

        <div class="tabs">

            <button id="loginTab"
                    class="tab active">
                Login
            </button>

            <button id="registerTab"
                    class="tab">
                Register
            </button>

        </div>

        <!-- LOGIN -->

        <form id="loginForm">

            <div class="input-group">

                <label>Email</label>

                <input
                        type="email"
                        id="loginEmail"
                        placeholder="example@mail.com"
                        required>

            </div>

            <div class="input-group">

                <label>Password</label>

                <input
                        type="password"
                        id="loginPassword"
                        placeholder="********"
                        required>

            </div>

            <button class="primary-btn">

                Login

            </button>

        </form>

        <!-- REGISTER -->

        <form id="registerForm" class="hidden">

            <div class="input-group">

                <label>Name</label>

                <input
                        id="registerName"
                        type="text"
                        placeholder="John Doe"
                        required>

            </div>

            <div class="input-group">

                <label>Email</label>

                <input
                        id="registerEmail"
                        type="email"
                        placeholder="example@mail.com"
                        required>

            </div>

            <div class="input-group">

                <label>Password</label>

                <input
                        id="registerPassword"
                        type="password"
                        placeholder="********"
                        required>

            </div>

            <button class="primary-btn">

                Create account

            </button>

        </form>

    </section>

    <!-- DASHBOARD -->

    <section id="dashboard" class="dashboard hidden">

        <div class="card">

            <h2>

                Welcome

            </h2>

            <div id="profile">

                Not logged in

            </div>

        </div>

        <div class="card">

            <h2>

                Access Token

            </h2>

            <textarea
                    id="token"
                    readonly></textarea>

            <button id="copyToken"
                    class="secondary-btn">

                Copy Token

            </button>

        </div>

        <div class="card buttons">

            <button id="helloBtn">

                Hello Endpoint

            </button>

            <button id="currentBtn">

                Current User

            </button>

            <button id="logoutBtn">

                Logout

            </button>

        </div>

        <div class="card">

            <h2>

                Server Response

            </h2>

            <pre id="response">

Ready...

</pre>

        </div>

    </section>

</div>

<div id="toast"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
